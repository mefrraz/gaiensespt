  <line x1="76" y1="52" x2="90" y2="38" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Dribly Text -->
  <text x="130" y="52" font-family="Outfit, 'Segoe UI', Arial, sans-serif" font-size="46" font-weight="800" fill="#2563EB" letter-spacing="-1">Dribly</text>
  <text x="133" y="84" font-family="Outfit, 'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#6B7280" letter-spacing="4" text-transform="uppercase">BASQUETEBOL</text>
